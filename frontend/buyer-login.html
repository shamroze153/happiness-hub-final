<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Orders — Happiness Hub</title>
<link rel="stylesheet" href="styles/main.css">
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="card slide-up" style="width:100%;max-width:400px;text-align:center;">
  <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--c-primary),var(--c-accent));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px;box-shadow:var(--glow);animation:float 4s ease-in-out infinite;">📱</div>
  <h2 style="margin-bottom:4px;">My Orders</h2>
  <p style="margin-bottom:28px;">Enter your WhatsApp number to view your order history & cashback status</p>
  <form id="loginForm">
    <div class="form-group text-left">
      <label class="form-label">WhatsApp Number</label>
      <input type="tel" id="wa" class="form-control" placeholder="+1234567890" autocomplete="tel" required>
    </div>
    <div id="err" class="err-box" style="display:none;"></div>
    <button type="submit" class="btn btn-primary w-full" id="btn" style="padding:14px;">View My Orders →</button>
  </form>
  <div style="margin-top:16px;display:flex;gap:16px;justify-content:center;">
    <a href="index.html" style="font-size:13px;color:var(--c-muted);">← Back to Deals</a>
    <a href="track.html" style="font-size:13px;color:var(--c-muted);">Track Single Order</a>
  </div>
</div>
<script src="lib/hh.js"></script>
<script>
(function(){const c=document.getElementById("particles"),ctx=c.getContext("2d");function r(){c.width=innerWidth;c.height=innerHeight;}r();window.addEventListener("resize",r);const pts=Array.from({length:30},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,a:Math.random()*.3+.05}));function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(124,106,255,${p.a})`;ctx.fill();});requestAnimationFrame(draw);}draw();})();

// If already have a saved number, prefill it
const saved = localStorage.getItem("hh_buyer_wa");
if (saved) document.getElementById("wa").value = saved;

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const wa = document.getElementById("wa").value.trim();
  const err = document.getElementById("err");
  err.style.display = "none";
  if (!wa || wa.replace(/\D/g,"").length < 6) {
    err.textContent = "Please enter a valid WhatsApp number.";
    err.style.display = "block";
    return;
  }
  localStorage.setItem("hh_buyer_wa", wa);
  location.href = "my-orders.html";
});
</script>
</body>
</html>
